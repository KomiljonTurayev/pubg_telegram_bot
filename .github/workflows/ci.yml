name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── 1. Lint va Syntax ──────────────────────────────────────
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ env.PYTHON_VERSION }} sozlash
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Kutubxonalarni o'rnatish
        run: pip install -r requirements.txt

      - name: Barcha .py fayllar syntax tekshiruvi
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for fname in os.listdir('.'):
              if not fname.endswith('.py') or fname.startswith('_'):
                  continue
              try:
                  ast.parse(open(fname).read())
              except SyntaxError as e:
                  errors.append(f'{fname}:{e.lineno}: {e.msg}')
          if errors:
              print('SYNTAX ERRORS:')
              [print(e) for e in errors]
              sys.exit(1)
          print('All .py files syntax OK')
          "

      - name: Import tekshiruvi (DB mock bilan)
        env:
          BOT_TOKEN: "0:test_token"
          ADMIN_ID: "0"
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          YOUTUBE_API_KEY: ""
          OMDB_API_KEY: ""
        run: |
          python -c "
          import sys, os, unittest.mock as mock

          fake_db = mock.AsyncMock()
          fake_db.is_banned = mock.AsyncMock(return_value=False)
          fake_db.is_admin_db = mock.AsyncMock(return_value=False)
          sys.modules['database'] = mock.MagicMock(db=fake_db, Database=mock.MagicMock(return_value=fake_db))
          sys.modules['psycopg2'] = mock.MagicMock()
          sys.modules['psycopg2.pool'] = mock.MagicMock()

          modules = [
              'config','rate_limiter','trending','movie_handler',
              'music_menu','shazam_handler','music_downloader',
              'music_search','utils','bot',
          ]
          ok = True
          for m in modules:
              try:
                  __import__(m)
                  print(f'  OK  {m}')
              except Exception as e:
                  print(f'  ERR {m}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          "

  # ── 2. Testlar ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ env.PYTHON_VERSION }} sozlash
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Kutubxonalarni o'rnatish
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Testlarni ishga tushirish
        env:
          BOT_TOKEN: "0:test_token"
          ADMIN_ID: "0"
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          YOUTUBE_API_KEY: ""
          OMDB_API_KEY: ""
        run: pytest tests/ -v --tb=short

  # ── 3. Docker Hub-ga yuklash ──────────────────────────────
  docker-hub:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pubg-bot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pubg-bot:${{ github.sha }}

  # ── 4. Render Deploy ───────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Render deploy boshlash
        id: trigger
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          DEPLOY_ID=$(echo "$BODY" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")

          echo "HTTP: $HTTP_CODE  |  Deploy ID: $DEPLOY_ID"
          if [ "$HTTP_CODE" != "201" ]; then
            echo "Deploy boshlashda xatolik: $BODY"
            exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Deploy holati kuzatish
        run: |
          DEPLOY_ID="${{ steps.trigger.outputs.deploy_id }}"
          for i in $(seq 1 20); do
            sleep 30
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")

            echo "[$i/20] Status: $STATUS"
            case "$STATUS" in
              live)          echo "Deploy muvaffaqiyatli!"; exit 0 ;;
              build_failed|deactivated|canceled)
                             echo "Deploy muvaffaqiyatsiz: $STATUS"; exit 1 ;;
            esac
          done
          echo "Timeout — deploy 10 daqiqada tugamadi"; exit 1
