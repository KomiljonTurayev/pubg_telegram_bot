name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 sozlash
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Kutubxonalarni o'rnatish
        run: pip install -r requirements.txt

      - name: Syntax tekshirish (barcha .py fayllar)
        run: |
          python -m py_compile bot.py config.py database.py utils.py \
            music_downloader.py music_search.py music_menu.py \
            music_handler.py charts.py common.py decorators.py
          echo "✅ Syntax OK"

      - name: Import tekshirish
        run: |
          python -c "
          import ast, sys, os
          errors = []
          for f in ['bot.py','config.py','database.py','utils.py',
                    'music_downloader.py','music_search.py','music_menu.py']:
              if not os.path.exists(f): continue
              try:
                  ast.parse(open(f).read())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('❌ Xatoliklar:')
              [print(e) for e in errors]
              sys.exit(1)
          print('✅ AST parse OK')
          "

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Render ga deploy qilish
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          DEPLOY_ID=$(echo "$BODY" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

          echo "Deploy ID: $DEPLOY_ID"
          echo "HTTP: $HTTP_CODE"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Deploy boshlashda xatolik: $BODY"
            exit 1
          fi

          echo "⏳ Deploy holati kuzatilmoqda..."

          for i in $(seq 1 30); do
            sleep 20
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)

            echo "[$i/30] Status: $STATUS"

            if [ "$STATUS" = "live" ]; then
              echo "✅ Deploy muvaffaqiyatli!"
              exit 0
            fi

            if [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Deploy muvaffaqiyatsiz: $STATUS"
              exit 1
            fi
          done

          echo "⏰ Timeout — deploy 10 daqiqada tugamadi"
          exit 1
